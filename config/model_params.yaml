xgboost:
  fixed:
    objective: "binary:logistic"
    eval_metric: "logloss"
    n_estimators: 500
    early_stopping_rounds: 50
    random_state: 42
    n_jobs: -1
  search_space:
    max_depth: [3, 10]
    learning_rate: [0.01, 0.3]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    min_child_weight: [1, 10]
    gamma: [0.0, 5.0]
    reg_alpha: [0.0, 10.0]
    reg_lambda: [0.0, 10.0]

lightgbm:
  fixed:
    objective: "binary"
    metric: "binary_logloss"
    n_estimators: 500
    early_stopping_rounds: 50
    random_state: 42
    n_jobs: -1
    verbose: -1
  search_space:
    max_depth: [3, 12]
    learning_rate: [0.01, 0.3]
    num_leaves: [20, 150]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    min_child_samples: [5, 50]
    reg_alpha: [0.0, 10.0]
    reg_lambda: [0.0, 10.0]

optuna:
  n_trials: 50
  timeout_seconds: 3600
  sampler: "TPESampler"
  pruner: "MedianPruner"
