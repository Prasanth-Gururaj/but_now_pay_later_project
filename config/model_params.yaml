# Model training parameters.
# Change values here and re-run: python -m bnpl.main training-pipeline
# Every run is logged to DagsHub MLflow so you can compare results.

logistic_regression:
  class_weight: "balanced"
  max_iter: 2000
  random_state: 42
  # C controls regularization: smaller = stronger regularization
  # solver lbfgs works well with balanced class weights
  C: 0.5
  solver: "lbfgs"

xgboost:
  n_estimators: 800
  max_depth: 7
  learning_rate: 0.03
  subsample: 0.75
  colsample_bytree: 0.75
  min_child_weight: 5
  gamma: 0.1
  reg_alpha: 0.1
  reg_lambda: 1.0
  eval_metric: "auc"
  early_stopping_rounds: 40
  random_state: 42

  # Optuna search space (used by: python -m bnpl.main tune)
  search_space:
    max_depth: [3, 10]
    learning_rate: [0.01, 0.3]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    min_child_weight: [1, 10]
    gamma: [0.0, 5.0]
    reg_alpha: [0.0, 10.0]
    reg_lambda: [0.0, 10.0]

lightgbm:
  n_estimators: 600
  max_depth: 7
  learning_rate: 0.03
  subsample: 0.75
  colsample_bytree: 0.75
  num_leaves: 63
  min_child_samples: 40
  reg_alpha: 0.1
  reg_lambda: 1.0
  early_stopping_rounds: 40
  random_state: 42
  n_jobs: -1
  verbose: -1

  # Optuna search space
  search_space:
    max_depth: [3, 12]
    learning_rate: [0.01, 0.3]
    num_leaves: [20, 150]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    min_child_samples: [5, 50]
    reg_alpha: [0.0, 10.0]
    reg_lambda: [0.0, 10.0]

optuna:
  n_trials: 50
  timeout_seconds: 3600
  sampler: "TPESampler"
  pruner: "MedianPruner"
